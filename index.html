<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DSA Practice</title>
<style>
  :root {
    --bg: #000000;
    --surface-2: #141414;
    --surface-2-hover: #1f1f1f;
    --border: #262626;
    --text: #f5f5f5;
    --text-secondary: #9a9a9a;
    --accent: #8ab4f8;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; background: var(--bg); color: var(--text);
    font-family: var(--sans); -webkit-font-smoothing: antialiased;
  }
  .app { max-width: 720px; margin: 0 auto; padding: 56px 28px 60px; }
  @media (max-width: 560px) { .app { padding: 36px 16px 48px; } }

  .title { font-size: 32px; font-weight: 600; letter-spacing: -0.01em; margin: 0 0 8px; color: #fff; }
  .subtitle { font-size: 14px; color: var(--text-secondary); margin: 0 0 32px; }

  .topic-list { display: flex; flex-direction: column; gap: 10px; }

  .topic-card {
    display: flex; align-items: center; gap: 14px;
    background: var(--surface-2); border: 1px solid var(--border); border-radius: 14px;
    padding: 16px 18px; text-decoration: none; color: var(--text);
    transition: background .15s, border-color .15s;
  }
  .topic-card:hover { background: var(--surface-2-hover); border-color: var(--accent); }

  .topic-icon {
    flex: 0 0 36px; width: 36px; height: 36px; border-radius: 10px;
    background: rgba(138,180,248,0.12); color: var(--accent);
    display: flex; align-items: center; justify-content: center;
  }
  .topic-icon svg { width: 18px; height: 18px; }

  .topic-main { flex: 1 1 auto; min-width: 0; }
  .topic-name { font-size: 15px; font-weight: 600; margin: 0 0 2px; }
  .topic-desc { font-size: 12.5px; color: var(--text-secondary); margin: 0; }

  .topic-arrow { flex: 0 0 auto; color: var(--text-secondary); }
  .topic-arrow svg { width: 16px; height: 16px; }

  /* Template for a future topic card you haven't added a page for yet.
     Duplicate a .topic-card block above and point its href at the new file
     once you commit it — this one is just a visual placeholder. */
  .topic-card.is-placeholder {
    opacity: .45; pointer-events: none; cursor: default;
  }
</style>
</head>
<body>
  <div class="app">
    <h1 class="title">DSA Practice</h1>
    <p class="subtitle">Pick a topic to start solving.</p>

    <div class="topic-list">
      <a class="topic-card" href="Arrays%26Strings.html">
        <span class="topic-icon">
          <svg viewBox="0 0 24 24" fill="none"><path d="M4 6h16M4 12h16M4 18h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </span>
        <span class="topic-main">
          <p class="topic-name">Arrays &amp; Strings</p>
          <p class="topic-desc">Two pointers, sliding window, hashing</p>
        </span>
        <span class="topic-arrow">
          <svg viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </span>
      </a>

      <!-- Add the next topic the same way once its .html file is committed, e.g.:
      <a class="topic-card" href="LinkedLists.html"> ... </a>
      -->
    </div>
  </div>
</body>
</html>
