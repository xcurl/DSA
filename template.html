<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DSA Practice</title>
  <style>
    :root {
      --bg: #000000;
      --surface-2: #000000;
      --surface-2-hover: #0a0a0a;
      --border: #222222;
      --border-soft: rgba(255, 255, 255, 0.07);
      --text: #f5f5f5;
      --text-secondary: #9a9a9a;
      --accent: #8ab4f8;
      --danger: #f04438;
      --danger-hover: #d93c30;
      --done-tint: rgba(138, 180, 248, 0.06);
      --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
      --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
    }

    .app {
      max-width: 920px;
      margin: 0 auto;
      padding: 32px 28px 60px;
    }

    @media (max-width: 560px) {
      .app {
        padding: 24px 16px 48px;
      }
    }

    .topbar {
      margin-bottom: 18px;
    }

    .back-link {
      font-size: 13px;
      color: var(--text-secondary);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .back-link:hover {
      color: var(--text);
    }

    .back-link svg {
      width: 13px;
      height: 13px;
    }

    .title {
      font-size: 30px;
      font-weight: 600;
      letter-spacing: -0.01em;
      margin: 0 0 24px;
      color: #fff;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 4px 12px;
      justify-content: space-between;
    }

    @media (max-width: 560px) {
      .title {
        font-size: 24px;
        margin-bottom: 18px;
      }
    }

    .progress-top {
      margin-bottom: 26px;
    }

    .progress-top-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 9px;
    }

    .progress-label {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .progress-value {
      font-family: var(--mono);
      font-size: 14px;
      color: var(--text);
      letter-spacing: .2px;
    }

    .progress-bar-mini {
      width: 100%;
      height: 5px;
      border-radius: 999px;
      background: var(--border);
      overflow: hidden;
    }

    .progress-bar-mini-fill {
      height: 100%;
      background: var(--accent);
      width: 0%;
      transition: width .3s ease;
    }

    .controls-bar {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 8px;
    }

    .control-group {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .control-group.day-group {
      flex: 0 0 auto;
    }

    .control-group.search-group {
      flex: 1 1 auto;
      min-width: 0;
    }

    .control-label {
      font-size: 13px;
      color: var(--text-secondary);
      white-space: nowrap;
    }

    @media (max-width: 600px) {
      .controls-bar {
        flex-wrap: wrap;
        row-gap: 10px;
      }

      .control-group.day-group,
      .control-group.search-group {
        flex: 1 1 100%;
      }
    }

    .stepper {
      display: flex;
      align-items: center;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 999px;
      height: 46px;
      overflow: hidden;
      width: 160px;
      flex: 0 0 160px;
    }

    .stepper-arrow {
      flex: 0 0 46px;
      height: 46px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: none;
      color: var(--text);
      cursor: pointer;
    }

    .stepper-arrow svg {
      width: 16px;
      height: 16px;
    }

    .stepper-arrow:disabled {
      opacity: .3;
      cursor: default;
    }

    .stepper-arrow:hover:not(:disabled) {
      background: var(--surface-2-hover);
    }

    .stepper-value {
      flex: 1;
      text-align: center;
      font-size: 14px;
      font-weight: 600;
      font-family: var(--mono);
      white-space: nowrap;
    }

    .search-input {
      width: 100%;
      height: 46px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text);
      padding: 0 18px;
      font-size: 14px;
      outline: none;
      font-family: var(--sans);
    }

    .search-input::placeholder {
      color: var(--text-secondary);
    }

    .search-input:focus {
      border-color: var(--accent);
    }

    .table-wrap {
      border-top: 1px solid var(--border);
      margin-top: 20px;
    }

    .table-header {
      display: none;
    }

    .row {
      display: block;
      border-bottom: 1px solid var(--border-soft);
      padding: 14px 12px;
      cursor: pointer;
      transition: background .15s;
    }

    .row-top {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .cell-status {
      display: flex;
      flex: 0 0 auto;
    }

    .cell-title {
      flex: 1 1 auto;
      min-width: 0;
      font-size: 14.5px;
      font-weight: 500;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .cell-approach {
      display: block;
      margin-top: 4px;
      padding-left: 33px;
      font-size: 13px;
      color: var(--text-secondary);
    }

    .cell-target {
      display: flex;
      flex: 0 0 auto;
      font-size: 13px;
      color: var(--text-secondary);
      white-space: nowrap;
    }

    .cell-note {
      display: flex;
      flex: 0 0 auto;
      align-items: center;
      gap: 5px;
      padding-right: 4px;
    }

    .formatting-toolbar-ext button {
      background: transparent;
      border: none;
      color: #888;
      cursor: pointer;
      border-radius: 5px;
      padding: 4px 6px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.3px;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .formatting-toolbar-ext button:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #bbb;
    }

    @keyframes drawCircle {
      0% { stroke-dashoffset: 65; stroke: #4caf50; filter: drop-shadow(0 0 2px rgba(76, 175, 80, 0.6)); }
      50% { stroke-dashoffset: 0; stroke: #4caf50; filter: drop-shadow(0 0 2px rgba(76, 175, 80, 0.6)); }
      100% { stroke-dashoffset: 0; stroke: #888; filter: none; }
    }
    @keyframes drawTick {
      0% { stroke-dashoffset: 25; stroke: transparent; filter: drop-shadow(0 0 2px rgba(76, 175, 80, 0.6)); }
      49% { stroke-dashoffset: 25; stroke: transparent; }
      50% { stroke-dashoffset: 25; stroke: #4caf50; filter: drop-shadow(0 0 2px rgba(76, 175, 80, 0.6)); }
      80% { stroke-dashoffset: 0; stroke: #4caf50; filter: drop-shadow(0 0 2px rgba(76, 175, 80, 0.6)); }
      100% { stroke-dashoffset: 0; stroke: #888; filter: none; }
    }
    .flash-sweep {
      animation: none !important;
      background: transparent !important;
    }
    .flash-sweep .anim-circle {
      stroke-dasharray: 65;
      stroke-dashoffset: 65;
      animation: drawCircle 1.2s ease-in-out forwards;
    }
    .flash-sweep .anim-tick {
      stroke-dasharray: 25;
      stroke-dashoffset: 25;
      animation: drawTick 1.2s ease-in-out forwards;
    }

    .tab-edit-md-btn {
      transition: color 0.2s, background 0.2s;
    }
    .tab-edit-md-btn:hover {
      color: #8ab4f8 !important;
    }

    .notes-panel {
      display: block;
      max-height: 0;
      opacity: 0;
      overflow: hidden;
      padding: 0 4px 0 4px; /* padding-top/bottom 0 when closed */
      transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s ease, padding 0.4s ease;
    }

    .notes-panel.is-open {
      max-height: 2500px;
      opacity: 1;
      padding: 10px 4px 14px 4px;
    }

    .row:hover {
      background: rgba(255, 255, 255, .03);
    }

    .row.is-done {
      background: var(--done-tint);
    }

    .row.is-done .cell-title {
      text-decoration: line-through;
      opacity: .65;
    }

    @media (min-width: 680px) {
      .table-header {
        display: grid;
        grid-template-columns: 40px 1fr 170px 110px 80px;
        gap: 0 16px;
        padding: 12px 4px;
        border-bottom: 1px solid var(--border);
        color: var(--text-secondary);
        font-size: 13px;
        font-weight: 600;
      }

      .row {
        display: grid;
        grid-template-columns: 40px 1fr 170px 110px 80px;
        gap: 0 16px;
        padding: 0 8px;
      }

      .row-top {
        display: contents;
      }

      .cell-status {
        grid-column: 1;
        grid-row: 1;
        padding: 13px 0;
        display: flex;
        align-items: center;
      }

      .cell-title {
        grid-column: 2;
        grid-row: 1;
        padding: 13px 0;
        font-weight: 400;
        min-width: 0;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .cell-approach {
        grid-column: 3;
        grid-row: 1;
        padding: 13px 0;
        margin-top: 0;
        padding-left: 0;
        margin-left: -12px;
        display: flex;
        align-items: center;
        font-size: 13px;
        color: var(--text-secondary);
      }

      .cell-target {
        grid-column: 4;
        grid-row: 1;
        padding: 13px 0;
        display: flex;
        align-items: center;
        font-size: 13px;
        color: var(--text-secondary);
      }

      .cell-note {
        grid-column: 5;
        grid-row: 1;
        padding: 13px 8px 13px 0;
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 8px;
      }

      .notes-panel {
        grid-column: 1 / -1;
        grid-row: 2;
        padding-top: 0;
        padding-bottom: 0;
        padding-left: 56px;
        padding-right: 4px;
      }
      .notes-panel.is-open {
        padding-top: 0;
        padding-bottom: 14px;
      }
    }

    /* Mobile overrides */
    @media (max-width: 679px) {
      .notes-tabs {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
        max-width: calc(100vw - 120px);
      }

      .notes-tabs::-webkit-scrollbar {
        display: none;
      }

      .cell-target {
        display: none;
      }

      .notes-tab {
        padding: 5px 10px;
      }
    }

    .check-circle {
      width: 21px;
      height: 21px;
      border-radius: 50%;
      border: 1.5px solid var(--text-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .row.is-done .check-circle {
      background: var(--accent);
      border-color: var(--accent);
    }

    .check-circle svg {
      width: 11px;
      height: 11px;
      display: block;
    }

    .link-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      color: var(--text-secondary);
      opacity: 0;
      transition: opacity .15s, color .15s;
      text-decoration: none;
    }

    .row:hover .link-btn {
      opacity: .5;
    }

    .link-btn:hover {
      opacity: 1 !important;
      color: var(--accent);
    }

    .link-btn svg {
      width: 14px;
      height: 14px;
      pointer-events: none;
    }

    .notes-btn {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 0;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color .15s, background .15s;
      flex-shrink: 0;
    }

    .notes-btn:hover {
      color: var(--text);
      background: rgba(255, 255, 255, .08);
    }

    .notes-btn.has-note {
      color: var(--accent);
    }

    .notes-btn svg {
      width: 15px;
      height: 15px;
      pointer-events: none;
    }

    .notes-tabs {
      display: flex;
      align-items: center;
      gap: 2px;
      margin-bottom: 10px;
      background: rgba(255, 255, 255, .04);
      border-radius: 10px;
      padding: 3px;
      width: fit-content;
    }

    .notes-tab {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px 13px;
      border-radius: 7px;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: var(--sans);
      transition: background .15s, color .15s;
    }

    .notes-tab svg {
      width: 13px;
      height: 13px;
      flex-shrink: 0;
    }

    .notes-tab.active {
      background: var(--surface-2-hover);
      color: var(--text);
    }

    .notes-tab:hover:not(.active) {
      color: var(--text);
    }

    .tab-add-approach-btn {
      display: none;
      align-items: center;
      gap: 5px;
      font-size: 11.5px;
      font-weight: 600;
      color: var(--accent);
      background: rgba(138, 180, 248, .06);
      border: 1px dashed rgba(138, 180, 248, .3);
      border-radius: 7px;
      padding: 4px 10px;
      cursor: pointer;
      font-family: var(--sans);
      transition: background .15s, border-color .15s;
      margin-left: 6px;
      white-space: nowrap;
    }

    .tab-add-approach-btn.visible {
      display: inline-flex;
    }

    .tab-add-approach-btn svg {
      width: 12px;
      height: 12px;
    }

    .tab-add-approach-btn:hover {
      background: rgba(138, 180, 248, .14);
      border-color: rgba(138, 180, 248, .55);
    }

    .complexity-row {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .complexity-pill {
      display: flex;
      align-items: center;
      gap: 3px;
      background: transparent;
      border: none;
      padding: 0;
      font-size: 10.5px;
      font-family: var(--mono);
    }

    .complexity-pill-label {
      color: rgba(255, 255, 255, .35);
      font-weight: 700;
      letter-spacing: .4px;
      white-space: nowrap;
      font-size: 10px;
    }

    .complexity-input {
      background: transparent;
      border: none;
      outline: none;
      color: rgba(255, 255, 255, .65);
      font-family: var(--mono);
      font-size: 11px;
      width: 68px;
      min-width: 0;
      padding: 0;
    }

    .complexity-input::placeholder {
      color: rgba(255, 255, 255, .18);
    }

    .complexity-input:focus {
      color: rgba(255, 255, 255, .9);
    }

    /* Notes textarea - simple, no overlay tricks */
    .notes-md-wrap {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 100%;
    }

    .notes-md-wrap>* {
      min-height: 86px;
      font-family: var(--sans);
      font-size: 13px;
      line-height: 1.6;
      padding: 10px 14px;
      margin: 0;
      box-sizing: border-box;
    }

    .notes-textarea {
      width: 100%;
      background: #000000;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      resize: vertical;
      outline: none;
      overflow: auto;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .notes-textarea::placeholder {
      color: var(--text-secondary);
    }

    .notes-textarea:focus {
      border-color: var(--accent);
    }

    /* Preview panel */
    .notes-md-render {
      display: none;
      color: var(--text);
      background: #000000;
      border: 1px solid var(--border-soft);
      border-radius: 10px;
      overflow: hidden;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .notes-md-render .md-line {
      min-height: 1.6em;
    }

    /* Bold rendered as accent blue */
    .notes-md-render .md-b {
      color: var(--accent);
      font-weight: 700;
    }

    /* Bullet */
    .notes-md-render .md-bullet-line {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding-left: 2px;
    }

    .notes-md-render .md-bullet {
      color: var(--accent);
      font-weight: 700;
      flex-shrink: 0;
      line-height: 1.6;
    }

    /* Code editor */
    .code-editor-wrap {
      border: 1px solid rgba(255, 255, 255, .08);
      border-radius: 14px;
      overflow: hidden;
      background: #000000;
      display: flex;
      flex-direction: column;
      box-shadow: 0 2px 16px rgba(0, 0, 0, .4), inset 0 1px 0 rgba(255, 255, 255, .04);
      transition: border-color .2s, box-shadow .2s;
    }

    .code-editor-wrap.is-focused {
      border-color: rgba(138, 180, 248, .4);
      box-shadow: 0 0 0 3px rgba(138, 180, 248, .07), 0 4px 24px rgba(0, 0, 0, .5);
    }

    .code-editor-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 14px;
      background: #000000;
      border-bottom: 1px solid rgba(255, 255, 255, .06);
      flex-shrink: 0;
      gap: 0 8px;
    }

    .code-editor-header-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
      margin-left: auto;
    }

    @media (max-width: 679px) {
      .code-editor-header {
        flex-wrap: nowrap;
        gap: 0 4px;
        padding: 6px 10px;
      }

      /* Hide the 'Time :' and 'Space :' label text on mobile, show only the value */
      .complexity-pill-label {
        display: none;
      }

      /* Tighten the complexity value input on mobile */
      .complexity-input {
        width: 40px;
        font-size: 10px;
      }

      .complexity-pill {
        gap: 0;
      }

      /* Always show copy and delete buttons on mobile */
      .code-editor-header-actions {
        display: flex !important;
        gap: 4px;
      }

      .approach-remove-btn,
      .code-copy-btn {
        width: 28px;
        height: 28px;
      }

      .approach-remove-btn svg,
      .code-copy-btn svg {
        width: 15px;
        height: 15px;
      }

      /* Shrink label input to fit */
      .approach-label-input {
        min-width: 40px;
        max-width: 100px;
        font-size: 10px;
      }
    }

    .approach-label-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1 1 auto;
      min-width: 0;
    }

    .approach-label-input {
      flex: 1 1 auto;
      min-width: 60px;
      background: transparent;
      border: none;
      outline: none;
      color: rgba(255, 255, 255, .75);
      font-size: 11.5px;
      font-weight: 600;
      font-family: var(--mono);
      letter-spacing: .4px;
      text-transform: uppercase;
      padding: 3px 0;
      border-radius: 0;
    }

    .approach-label-input:focus {
      color: #e6edf3;
    }

    .approach-label-input::placeholder {
      color: #4a4a4a;
    }

    .approach-remove-btn {
      width: 22px;
      height: 22px;
      border-radius: 6px;
      border: none;
      background: transparent;
      color: rgba(255, 255, 255, .25);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      padding: 0;
      transition: color .15s, background .15s;
    }

    .approach-remove-btn svg {
      width: 12px;
      height: 12px;
      pointer-events: none;
    }

    .approach-remove-btn:hover {
      color: var(--danger);
      background: rgba(240, 68, 56, .12);
    }

    .approaches-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .approaches-list:not(:empty) {
      margin-bottom: 10px;
    }

    .add-approach-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11.5px;
      font-weight: 600;
      color: var(--accent);
      background: rgba(138, 180, 248, .06);
      border: 1px dashed rgba(138, 180, 248, .3);
      border-radius: 7px;
      padding: 5px 11px;
      cursor: pointer;
      font-family: var(--sans);
      transition: background .15s, border-color .15s;
    }

    .add-approach-btn svg {
      width: 12px;
      height: 12px;
    }

    .add-approach-btn:hover {
      background: rgba(138, 180, 248, .14);
      border-color: rgba(138, 180, 248, .55);
    }

    .code-copy-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      color: rgba(255, 255, 255, .28);
      background: transparent;
      border: none;
      border-radius: 5px;
      padding: 0;
      cursor: pointer;
      transition: color .15s;
      flex-shrink: 0;
    }

    .code-copy-btn svg {
      width: 13px;
      height: 13px;
      pointer-events: none;
    }

    .code-copy-btn:hover {
      color: rgba(255, 255, 255, .75);
    }

    .code-copy-btn.copied {
      color: #4ade80;
    }

    .code-editor-body {
      display: grid;
      min-height: 140px;
      max-height: 360px;
      overflow: auto;
    }

    .code-editor-body>* {
      grid-area: 1 / 1;
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.65;
      padding: 12px 14px;
      margin: 0;
      tab-size: 4;
      white-space: pre-wrap;
      word-break: break-word;
      overflow: hidden;
      min-height: 140px;
    }

    .code-highlight {
      color: #e6edf3;
      background: transparent;
      border: none;
      outline: none;
      pointer-events: none;
      user-select: none;
      z-index: 1;
    }

    .code-raw {
      background: transparent;
      border: none;
      outline: none;
      resize: none;
      color: transparent;
      caret-color: #e6edf3;
      z-index: 2;
      position: relative;
    }

    .j-kw {
      color: #ff7b72;
    }

    .j-type {
      color: #79c0ff;
    }

    .j-str {
      color: #a5d6ff;
    }

    .j-num {
      color: #f2cc60;
    }

    .j-cmt {
      color: #8b949e;
      font-style: italic;
    }

    .j-ann {
      color: #d2a8ff;
    }

    .j-op {
      color: #ff7b72;
    }

    .j-meth {
      color: #d2a8ff;
    }

    .notes-saved {
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 6px;
      min-height: 16px;
    }

    .notes-pane {
      display: none;
    }

    .notes-pane.active {
      display: block;
    }

    /* Removed .notes-hint — no more markdown hint bar */
    .practice-btn {
      display: none;
      align-items: center;
      justify-content: center;
      height: 16px;
      min-width: 16px;
      padding: 0 5px;
      border-radius: 999px;
      background: transparent;
      border: 1px solid rgba(255, 255, 255, .18);
      cursor: pointer;
      font-size: 9px;
      font-weight: 700;
      font-family: var(--mono);
      color: rgba(255, 255, 255, .4);
      letter-spacing: .1px;
      transition: border-color .15s, color .15s;
      flex-shrink: 0;
      white-space: nowrap;
      line-height: 1;
    }

    .row.is-done .practice-btn {
      display: flex;
    }

    .practice-btn:hover {
      border-color: rgba(255, 255, 255, .35);
      color: rgba(255, 255, 255, .75);
    }

    .practice-modal-icon {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(138, 180, 248, .12);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 0 14px;
      color: var(--accent);
    }

    .practice-modal-icon svg {
      width: 22px;
      height: 22px;
    }

    .btn-accent {
      background: var(--accent);
      color: #000;
      font-weight: 700;
    }

    .btn-accent:hover {
      background: #a8c8ff;
    }

    .loading,
    .empty-state,
    .fatal-error {
      text-align: center;
      padding: 48px 0;
      color: var(--text-secondary);
      font-size: 14px;
    }

    .fatal-error a {
      color: var(--accent);
      text-decoration: none;
    }

    .fatal-error a:hover {
      text-decoration: underline;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .7);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 50;
    }

    .modal-overlay[hidden] {
      display: none;
    }

    .modal {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 16px;
      max-width: 360px;
      width: 100%;
      padding: 24px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, .5);
      animation: modalIn .16s ease;
    }

    @media (max-width: 560px) {
      .modal {
        padding: 18px;
        border-radius: 14px;
        max-width: 320px;
      }

      .modal-title {
        font-size: 15px;
        margin-bottom: 6px;
      }

      .modal-body {
        font-size: 13px;
        margin-bottom: 16px;
      }

      .btn {
        padding: 8px 13px;
        font-size: 12px;
      }

      .practice-modal-icon {
        width: 36px;
        height: 36px;
        margin-bottom: 10px;
      }

      .practice-modal-icon svg {
        width: 18px;
        height: 18px;
      }
    }

    @keyframes modalIn {
      from {
        opacity: 0;
        transform: scale(.96);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .modal-title {
      margin: 0 0 8px;
      font-size: 17px;
      font-weight: 600;
      color: #fff;
    }

    .modal-body {
      margin: 0 0 20px;
      font-size: 14px;
      line-height: 1.5;
      color: var(--text-secondary);
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    .btn {
      border: none;
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: var(--sans);
    }

    .btn-secondary {
      background: var(--surface-2-hover);
      color: var(--text);
    }

    .btn-secondary:hover {
      background: #262626;
    }

    .btn-danger {
      background: var(--danger);
      color: #fff;
    }

    .btn-danger:hover {
      background: var(--danger-hover);
    }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #fff;
      color: #000;
      padding: 10px 18px;
      border-radius: 10px;
      font-size: 13px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, .4);
      z-index: 60;
    }

    .toast[hidden] {

    }

    .db-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: var(--text-secondary);
      vertical-align: middle;
      font-weight: 400;
    }

    .db-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #4caf50;
    }

    .db-dot.error {
      background: var(--danger);
    }

    .db-dot.syncing {
      background: var(--accent);
      animation: pulse-dot 1s ease-in-out infinite;
    }

    @keyframes pulse-dot {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.35;
      }
    }
  </style>
  <script src="markdown-component.js" defer></script>

<body>

  <div class="modal-overlay" id="modalOverlay" hidden>
    <div class="modal" role="alertdialog" aria-modal="true" aria-labelledby="modalTitle" aria-describedby="modalBody">

  <div class="modal-overlay" id="practiceModalOverlay" hidden>
    <div class="modal" role="alertdialog" aria-modal="true" aria-labelledby="practiceModalTitle"
      aria-describedby="practiceModalBody">
      <div class="practice-modal-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round">
          <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z" />
        </svg>
      </div>
      <h2 class="modal-title" id="practiceModalTitle">Log practice?</h2>
      <p class="modal-body" id="practiceModalBody"></p>
      <div class="modal-actions">
        <button class="btn btn-secondary" id="practiceModalCancel">Cancel</button>
        <button class="btn btn-accent" id="practiceModalConfirm">Yes, I practised!</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="approachModalOverlay" hidden>
    <div class="modal" role="alertdialog" aria-modal="true" aria-labelledby="approachModalTitle"
      aria-describedby="approachModalBody">
      <h2 class="modal-title" id="approachModalTitle">Delete this approach?</h2>
      <p class="modal-body" id="approachModalBody"></p>
      <div class="modal-actions">
        <button class="btn btn-secondary" id="approachModalCancel">Cancel</button>
        <button class="btn btn-danger" id="approachModalConfirm">Delete</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast" hidden></div>

  <script>
    (function () {
      "use strict";

      var topicId = new URLSearchParams(window.location.search).get("topic") || "";
      var CONVEX_URL = "https://agreeable-impala-393.convex.cloud";
      var USER_ID = "dsa-user-me";

      var state = {
        day: "", search: "", completed: new Set(),
        notes: {}, practiceCounts: {}, pending: null,
        practicePending: null, approachPending: null
      };
      var DAYS = [];
      var dayIndex = 0;
      var allProblems = [];

      var CACHE_TTL = 5 * 60 * 1000;
      var _cacheKey = "dsa-cache-" + topicId;

      function getCached() {
        try {
          var raw = localStorage.getItem(_cacheKey);
          if (!raw) return null;
          var obj = JSON.parse(raw);
          if (Date.now() - obj.ts > CACHE_TTL) return null;
          return obj.data;
        } catch (e) { return null; }
      }
      function setCache(data) {
        try { localStorage.setItem(_cacheKey, JSON.stringify({ ts: Date.now(), data: data })); } catch (e) { }
      }

      function loadTopicFromConvex(id) {
        return convexQuery("problems:listForTopic", { topicId: id })
          .then(function (days) {
            if (!days || !days.length) throw new Error("No problems found in Convex for: " + id);
            var data = { title: id, days: days };
            return convexQuery("topics:get", { topicId: id })
              .then(function (topic) {
                if (topic && topic.name) data.title = topic.name;
                return data;
              })
              .catch(function () { return data; });
          });
      }

      function loadTopicScript(id) {
        return new Promise(function (resolve, reject) {
          if (!id) { reject(new Error("No topic was specified in the URL.")); return; }
          var s = document.createElement("script");
          s.src = "data/" + id + ".js";
          s.onload = function () {
            if (window.TOPIC_DATA) resolve(window.TOPIC_DATA);
            else reject(new Error("data/" + id + ".js loaded but did not set TOPIC_DATA."));
          };
          s.onerror = function () { reject(new Error("Couldn't find data/" + id + ".js.")); };
          document.head.appendChild(s);
        });
      }

      function loadTopicData(id) {
        var cached = getCached();
        if (cached) {
          setTimeout(function () {
            loadTopicFromConvex(id).then(setCache).catch(function () { });
          }, 100);
          return Promise.resolve(cached);
        }
        setSyncStatus("syncing");
        return loadTopicFromConvex(id)
          .then(function (data) { setCache(data); return data; })
          .catch(function () { return loadTopicScript(id); });
      }

      function buildProblems(data) {
        DAYS = []; allProblems = [];
        (data.days || []).forEach(function (d) {
          DAYS.push(d.name);
          (d.problems || []).forEach(function (p, i) {
            allProblems.push({
              id: d.name + "-" + i, day: d.name,
              title: p.title, approach: p.approach,
              target: p.target, link: p.link || ""
            });
          });
        });
        state.day = DAYS[0] || "";
        dayIndex = 0;
      }

      function showFatalError(message) {
        document.getElementById("pageTitleText").textContent = "Couldn't load this page";
        var badge = document.getElementById("dbBadge");
        if (badge) badge.style.display = "none";
        document.querySelector(".progress-top").style.display = "none";
        document.querySelector(".controls-bar").style.display = "none";
        document.getElementById("list").innerHTML =
          '<div class="fatal-error">' + esc(message) + '<br><br><a href="index.html">&larr; Back to all topics</a></div>';
      }

      function setSyncStatus(status) {
        var dot = document.getElementById("dbDot");
        var label = document.getElementById("dbLabel");
        if (!dot) return;
        if (status === "syncing") { dot.className = "db-dot syncing"; label.textContent = "Syncing…"; }
        else if (status === "error") { dot.className = "db-dot error"; label.textContent = "Sync error"; }
        else { dot.className = "db-dot"; label.textContent = "Synced"; }
      }
      function setDbStatus(ok) { setSyncStatus(ok ? "ok" : "error"); }

      function convexQuery(fnPath, args) {
        return fetch(CONVEX_URL + "/api/query", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ path: fnPath, args: args, format: "json" })
        })
          .then(function (r) { if (!r.ok) throw new Error("Convex query failed: " + r.status); return r.json(); })
          .then(function (json) {
            if (json.status === "success") return json.value;
            throw new Error(json.errorMessage || "Query error");
          });
      }

      function convexMutation(fnPath, args) {
        return fetch(CONVEX_URL + "/api/mutation", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ path: fnPath, args: args, format: "json" })
        })
          .then(function (r) { if (!r.ok) throw new Error("Convex mutation failed: " + r.status); return r.json(); })
          .then(function (json) {
            if (json.status === "success") return json.value;
            throw new Error(json.errorMessage || "Mutation error");
          });
      }

      function loadAll() {
        return convexQuery("progress:getAll", { userId: USER_ID, topicId: topicId })
          .then(function (data) {
            try { state.completed = new Set(data["completed"] ? JSON.parse(data["completed"]) : []); }
            catch (e) { state.completed = new Set(); }
            try {
              state.notes = data["notes"] ? JSON.parse(data["notes"]) : {};
              if (typeof state.notes !== "object" || Array.isArray(state.notes)) state.notes = {};
            } catch (e) { state.notes = {}; }
            try {
              state.practiceCounts = data["practiceCounts"] ? JSON.parse(data["practiceCounts"]) : {};
              if (typeof state.practiceCounts !== "object" || Array.isArray(state.practiceCounts)) state.practiceCounts = {};
            } catch (e) { state.practiceCounts = {}; }
          });
      }

      function saveCompleted() {
        setSyncStatus("syncing");
        convexMutation("progress:set", { userId: USER_ID, topicId: topicId, field: "completed", value: JSON.stringify(Array.from(state.completed)) })
          .then(function () { setSyncStatus("ok"); })
          .catch(function (err) { console.error("saveCompleted:", err); setSyncStatus("error"); showToast("Couldn't sync — check your connection."); });
      }
      function saveNotes() {
        setSyncStatus("syncing");
        convexMutation("progress:set", { userId: USER_ID, topicId: topicId, field: "notes", value: JSON.stringify(state.notes) })
          .then(function () { setSyncStatus("ok"); })
          .catch(function (err) { console.error("saveNotes:", err); setSyncStatus("error"); showToast("Couldn't save note — check your connection."); });
      }
      function savePracticeCounts() {
        setSyncStatus("syncing");
        convexMutation("progress:set", { userId: USER_ID, topicId: topicId, field: "practiceCounts", value: JSON.stringify(state.practiceCounts) })
          .then(function () { setSyncStatus("ok"); })
          .catch(function (err) { console.error("savePracticeCounts:", err); setSyncStatus("error"); showToast("Couldn't save practice count — check your connection."); });
      }
      function saveNoteFor(problemId, text) {
        if (text.trim()) state.notes[problemId] = text;
        else delete state.notes[problemId];
        saveNotes();
      }

      /* ── Java syntax highlighter ─────────────────────────── */
      var JAVA_KEYWORDS = new Set([
        "abstract", "assert", "boolean", "break", "byte", "case", "catch", "char", "class", "const",
        "continue", "default", "do", "double", "else", "enum", "extends", "final", "finally", "float",
        "for", "goto", "if", "implements", "import", "instanceof", "int", "interface", "long", "native",
        "new", "package", "private", "protected", "public", "return", "short", "static", "strictfp",
        "super", "switch", "synchronized", "this", "throw", "throws", "transient", "try", "var", "void",
        "volatile", "while", "true", "false", "null", "record", "sealed", "permits", "yield"
      ]);
      var JAVA_TYPES = new Set([
        "String", "Integer", "Long", "Double", "Float", "Boolean", "Character", "Byte", "Short",
        "Object", "Class", "System", "Math", "Arrays", "ArrayList", "LinkedList", "HashMap", "HashSet",
        "TreeMap", "TreeSet", "Stack", "Queue", "Deque", "PriorityQueue", "List", "Map", "Set",
        "Collection", "Collections", "Optional", "StringBuilder", "StringBuffer", "Comparator",
        "Comparable", "Iterable", "Iterator", "Thread", "Runnable", "Exception", "RuntimeException",
        "NullPointerException", "IndexOutOfBoundsException", "Scanner", "PrintStream",
        "BufferedReader", "InputStreamReader", "Stream", "Collectors", "IntStream"
      ]);
      function highlightJava(code) {
        var out = "", i = 0, len = code.length;
        function peek(n) { return code.slice(i, i + n); }
        function esc2(s) { return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }
        while (i < len) {
          var ch = code[i];
          if (peek(2) === "//") { var end = code.indexOf("\n", i); var seg = end === -1 ? code.slice(i) : code.slice(i, end); out += '<span class="j-cmt">' + esc2(seg) + '</span>'; i += seg.length; continue; }
          if (peek(2) === "/*") { var ce = code.indexOf("*/", i + 2); var seg2 = ce === -1 ? code.slice(i) : code.slice(i, ce + 2); out += '<span class="j-cmt">' + esc2(seg2) + '</span>'; i += seg2.length; continue; }
          if (ch === '"') { var s3 = '"'; i++; while (i < len) { var c2 = code[i]; s3 += c2; i++; if (c2 === '\\' && i < len) { s3 += code[i]; i++; } else if (c2 === '"') break; } out += '<span class="j-str">' + esc2(s3) + '</span>'; continue; }
          if (ch === "'") { var s4 = "'"; i++; while (i < len) { var c3 = code[i]; s4 += c3; i++; if (c3 === '\\' && i < len) { s4 += code[i]; i++; } else if (c3 === "'") break; } out += '<span class="j-str">' + esc2(s4) + '</span>'; continue; }
          if (ch === "@") { var ann = "@"; i++; while (i < len && /[A-Za-z0-9_$]/.test(code[i])) { ann += code[i]; i++; } out += '<span class="j-ann">' + esc2(ann) + '</span>'; continue; }
          if (/[0-9]/.test(ch) || (ch === "." && i + 1 < len && /[0-9]/.test(code[i + 1]))) { var num = ""; while (i < len && /[0-9_.xXbBoOlLfFdDeE+\-]/.test(code[i])) { num += code[i]; i++; } out += '<span class="j-num">' + esc2(num) + '</span>'; continue; }
          if (/[A-Za-z_$]/.test(ch)) {
            var word = "";
            while (i < len && /[A-Za-z0-9_$]/.test(code[i])) { word += code[i]; i++; }
            var after = code.slice(i).match(/^\s*\(/);
            if (JAVA_KEYWORDS.has(word)) out += '<span class="j-kw">' + esc2(word) + '</span>';
            else if (JAVA_TYPES.has(word)) out += '<span class="j-type">' + esc2(word) + '</span>';
            else if (after) out += '<span class="j-meth">' + esc2(word) + '</span>';
            else out += esc2(word);
            continue;
          }
          if (/[+\-*/%&|^~!=<>?:]/.test(ch)) { out += '<span class="j-op">' + esc2(ch) + '</span>'; i++; continue; }
          out += esc2(ch); i++;
        }
        return out;
      }

      /* ── Markdown rendering moved to markdown-component.js ── */

      /* ── UI helpers ──────────────────────────────────────── */
      var toastTimer;
      function showToast(msg) {
        var el = document.getElementById("toast");
        el.textContent = msg; el.hidden = false;
        clearTimeout(toastTimer);
        toastTimer = setTimeout(function () { el.hidden = true; }, 3000);
      }
      function esc(s) {
        return String(s).replace(/[&<>"']/g, function (c) {
          return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
        });
      }

      var CHECK_SVG = '<svg viewBox="0 0 16 16" fill="none"><path d="M3 8.5L6.2 11.7L13 4.5" stroke="#000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
      var NOTE_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="2"/><path d="M8 6h8M8 10h8M8 14h5"/></svg>';
      var LINK_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>';

      function updateDayControls() {
        document.getElementById("dayValue").textContent = state.day || "—";
        document.getElementById("dayPrev").disabled = dayIndex <= 0;
        document.getElementById("dayNext").disabled = dayIndex >= DAYS.length - 1;
      }
      function renderProgress() {
        var total = allProblems.length;
        var done = state.completed.size;
        var pct = total ? Math.round(done / total * 100) : 0;
        document.getElementById("progressFill").style.width = pct + "%";
        document.getElementById("progressValue").textContent = done + " / " + total + " Problems";
      }
      function filteredProblems() {
        var q = state.search.trim().toLowerCase();
        return allProblems.filter(function (p) {
          return p.day === state.day && (!q || p.title.toLowerCase().indexOf(q) !== -1);
        });
      }

      /* ── Multiple Java approaches ────────────────────────── */
      function loadApproachesFor(problemId) {
        var key = problemId + ":approaches";
        var existing = state.notes[key];
        if (Array.isArray(existing)) return existing;
        var legacyKey = problemId + ":code";
        var legacyCode = state.notes[legacyKey];
        if (legacyCode && String(legacyCode).trim()) {
          var migrated = [{ id: "a1", label: "Approach 1", code: legacyCode }];
          state.notes[key] = migrated;
          delete state.notes[legacyKey];
          saveNotes();
          return migrated;
        }
        return [];
      }

      function createApproachBlock(approach, onEdit, onRemove) {
        var wrap = document.createElement("div");
        wrap.className = "code-editor-wrap";
        var header = document.createElement("div");
        header.className = "code-editor-header";
        var labelInput = document.createElement("input");
        labelInput.className = "approach-label-input";
        labelInput.type = "text";
        labelInput.value = approach.label || "Approach";
        labelInput.placeholder = "Approach name";
        labelInput.setAttribute("aria-label", "Approach name");
        function makePill(labelText, placeholder, valKey) {
          var pill = document.createElement("div");
          pill.className = "complexity-pill";
          var lbl = document.createElement("span");
          lbl.className = "complexity-pill-label";
          lbl.textContent = labelText;
          var inp = document.createElement("input");
          inp.className = "complexity-input";
          inp.type = "text";
          inp.placeholder = placeholder;
          inp.value = approach[valKey] || "";
          inp.setAttribute("aria-label", labelText + " complexity");
          inp.addEventListener("click", function (e) { e.stopPropagation(); });
          inp.addEventListener("input", function () { approach[valKey] = inp.value; clearTimeout(inp._t); inp._t = setTimeout(onEdit, 600); });
          pill.appendChild(lbl); pill.appendChild(inp);
          return pill;
        }
        var timePill = makePill("Time :", "O(n)", "timeComplexity");
        var spacePill = makePill("Space :", "O(1)", "spaceComplexity");
        var actions = document.createElement("div");
        actions.className = "code-editor-header-actions";
        var copyBtn = document.createElement("button");
        copyBtn.type = "button"; copyBtn.className = "code-copy-btn"; copyBtn.title = "Copy code";
        copyBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
        var removeBtn = document.createElement("button");
        removeBtn.type = "button"; removeBtn.className = "approach-remove-btn"; removeBtn.title = "Delete this approach";
        removeBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>';
        actions.appendChild(copyBtn); actions.appendChild(removeBtn);
        header.appendChild(labelInput); header.appendChild(timePill); header.appendChild(spacePill); header.appendChild(actions);
        var body = document.createElement("div");
        body.className = "code-editor-body";
        var pre = document.createElement("pre");
        pre.className = "code-highlight";
        pre.setAttribute("aria-hidden", "true");
        var textarea = document.createElement("textarea");
        textarea.className = "code-raw";
        textarea.spellcheck = false;
        textarea.placeholder = "// Write your Java solution here…";
        textarea.value = approach.code || "";
        body.appendChild(pre); body.appendChild(textarea);
        wrap.appendChild(header); wrap.appendChild(body);
        function syncHighlight() {
          var code = textarea.value;
          pre.innerHTML = (code ? highlightJava(code) : "") + "\n";
        }
        syncHighlight();
        var saveTimer;
        function scheduleSave() { clearTimeout(saveTimer); saveTimer = setTimeout(onEdit, 450); }
        textarea.addEventListener("input", function () { approach.code = textarea.value; syncHighlight(); scheduleSave(); });
        textarea.addEventListener("keydown", function (e) {
          if (e.key === "Tab") {
            e.preventDefault();
            var start = textarea.selectionStart, end = textarea.selectionEnd;
            textarea.value = textarea.value.slice(0, start) + "    " + textarea.value.slice(end);
            textarea.selectionStart = textarea.selectionEnd = start + 4;
            approach.code = textarea.value; syncHighlight(); scheduleSave();
          }
        });
        textarea.addEventListener("focus", function () { wrap.classList.add("is-focused"); });
        textarea.addEventListener("blur", function () { wrap.classList.remove("is-focused"); });
        labelInput.addEventListener("input", function () { approach.label = labelInput.value; scheduleSave(); });
        copyBtn.addEventListener("click", function (e) {
          e.stopPropagation();
          navigator.clipboard.writeText(textarea.value).then(function () {
            copyBtn.classList.add("copied");
            setTimeout(function () { copyBtn.classList.remove("copied"); }, 1500);
          }).catch(function () { showToast("Couldn't copy to clipboard."); });
        });
        removeBtn.addEventListener("click", function (e) { e.stopPropagation(); onRemove(); });
        return wrap;
      }

      function openApproachDeleteConfirm(approach, onConfirmed) {
        state.approachPending = { onConfirmed: onConfirmed };
        var label = (approach && approach.label) ? approach.label : "this approach";
        document.getElementById("approachModalBody").textContent = '"' + label + '" and its code will be permanently deleted. Are you sure?';
        document.getElementById("approachModalOverlay").hidden = false;
        document.getElementById("approachModalCancel").focus();
      }
      function closeApproachDeleteConfirm() { state.approachPending = null; document.getElementById("approachModalOverlay").hidden = true; }
      function confirmApproachDelete() {
        var pending = state.approachPending;
        closeApproachDeleteConfirm();
        if (pending && typeof pending.onConfirmed === "function") pending.onConfirmed();
      }

      function setupCodePane(problemId, mountEl, onNoteChange, tabAddBtn) {
        var approaches = loadApproachesFor(problemId);
        var listEl = document.createElement("div");
        listEl.className = "approaches-list";
        mountEl.appendChild(listEl);
        function persist() {
          var key = problemId + ":approaches";
          if (approaches.length) state.notes[key] = approaches;
          else delete state.notes[key];
          saveNotes(); onNoteChange();
        }
        function render() {
          listEl.innerHTML = "";
          approaches.forEach(function (approach, idx) {
            var block = createApproachBlock(approach, persist, function () {
              openApproachDeleteConfirm(approach, function () { approaches.splice(idx, 1); persist(); render(); });
            });
            listEl.appendChild(block);
          });
        }
        render();
        function addApproach() {
          approaches.push({ id: "a" + Date.now() + Math.random().toString(36).slice(2, 6), label: "Approach " + (approaches.length + 1), code: "" });
          persist(); render();
          var boxes = listEl.querySelectorAll(".code-raw");
          var last = boxes[boxes.length - 1];
          if (last) setTimeout(function () { last.focus(); }, 50);
        }
        if (tabAddBtn) { tabAddBtn.addEventListener("click", function (e) { e.stopPropagation(); addApproach(); }); }
        return {
          hasContent: function () { return approaches.some(function (a) { return (a.code || "").trim().length > 0; }); }
        };
      }

      /* ── Render list ─────────────────────────────────────── */
      function renderList() {
        var listEl = document.getElementById("list");
        var items = filteredProblems();
        if (!items.length) {
          listEl.innerHTML = '<div class="' + (state.search ? "empty-state" : "loading") + '">' + (state.search ? "No problems match your search." : "No problems for this day.") + '</div>';
          return;
        }
        listEl.innerHTML = "";
        items.forEach(function (p) {
          var isDone = state.completed.has(p.id);
          var note = state.notes[p.id] || "";
          var hasNote = note.length > 0;
          var panelId = "np-" + p.id.replace(/[^a-z0-9]/gi, "-");
          var practiceCount = state.practiceCounts[p.id] || 0;
          var row = document.createElement("div");
          row.className = "row" + (isDone ? " is-done" : "");
          row.setAttribute("tabindex", "0");

          row.innerHTML =
            '<div class="row-top">' +
            '<span class="cell-status"><span class="check-circle">' + (isDone ? CHECK_SVG : "") + '</span></span>' +
            '<span class="cell-title">' + esc(p.title) +
            (p.link ? '<a class="link-btn" href="' + esc(p.link) + '" target="_blank" rel="noopener" title="Open on LeetCode" tabindex="-1">' + LINK_SVG + '</a>' : '') +
            '</span>' +
            '<span class="cell-target">' + esc(p.target) + '</span>' +
            '<span class="cell-note">' +
            '<button class="practice-btn" type="button" title="Log a practice session (×' + practiceCount + ')" aria-label="Log practice">' + (practiceCount > 0 ? '×' + practiceCount : '×0') + '</button>' +
            '<button class="notes-btn' + (hasNote ? " has-note" : "") + '" type="button" title="' + (hasNote ? "Edit note" : "Add note") + '" aria-expanded="false" aria-controls="' + panelId + '">' + NOTE_SVG + '</button>' +
            '</span>' +
            '</div>' +
            '<span class="cell-approach">' + esc(p.approach) + '</span>' +
            '<div class="notes-panel" id="' + panelId + '">' +
            '<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 10px;">' +
            '<div class="notes-tabs" style="margin-bottom:0;">' +
            '<button class="notes-tab active" data-tab="text" type="button">' +
            '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>' +
            'Notes' +
            '</button>' +
            '<button class="notes-tab" data-tab="code" type="button">' +
            '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>' +
            'Java' +
            '</button>' +
            '<button class="tab-add-approach-btn" type="button">' +
            '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>' +
            'Add approach' +
            '</button>' +
            '</div>' +
            '<div class="notes-header-right" style="display:flex; align-items:center; gap:8px;">' +
            '<div class="formatting-toolbar-ext" style="opacity:0; pointer-events:none; transition:opacity 0.3s ease; display:flex; align-items:center; gap:2px;">' +
            '<button type="button" data-action="bold" title="Bold (Ctrl+B)">B</button>' +
            '<button type="button" data-action="underline" title="Underline"><u>U</u></button>' +
            '<button type="button" data-action="h1" title="Heading">H1</button>' +
            '<button type="button" data-action="h2" title="Sub-heading">H2</button>' +
            '<div style="width:1px; height:12px; background:rgba(255,255,255,0.1); margin:0 2px;"></div>' +
            '<button type="button" data-action="highlight" title="Highlight">Hl</button>' +
            '<button type="button" data-action="color" title="Red color">🔴</button>' +
            '<div style="width:1px; height:12px; background:rgba(255,255,255,0.1); margin:0 2px;"></div>' +
            '<button type="button" data-action="points" title="Bullet list">• List</button>' +
            '<button type="button" data-action="code" title="Inline code">&lt;/&gt;</button>' +
            '<div style="width:1px; height:12px; background:rgba(255,255,255,0.1); margin:0 2px;"></div>' +
            '<button type="button" data-action="font-dec" title="Decrease font size">A-</button>' +
            '<button type="button" data-action="font-inc" title="Increase font size">A+</button>' +
            '</div>' +
            '<button class="tab-edit-md-btn" title="Edit Notes" type="button" style="color: #888; padding: 5px; border-radius: 7px; border: none; cursor: pointer; background: transparent; margin-right: 4px;">' +
            '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0; display:block;"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>' +
            '</button>' +
            '</div>' +
            '</div>' +
            '<div class="notes-pane active" data-pane="text">' +
            '<markdown-editor initial-value="' + esc(note) + '"></markdown-editor>' +
            '</div>' +
            '<div class="notes-pane" data-pane="code"><div class="code-pane-mount"></div></div>' +
            '<div class="notes-saved"></div>' +
            '</div>';

          /* toggle completion */
          row.addEventListener("click", function (e) {
            if (e.target.closest(".notes-btn") || e.target.closest(".notes-panel") || e.target.closest(".practice-btn") || e.target.closest(".link-btn")) return;
            toggleProblem(p);
          });
          row.addEventListener("keydown", function (e) {
            if (e.target.closest(".notes-btn") || e.target.closest(".notes-panel") || e.target.closest(".practice-btn")) return;
            if (e.key === "Enter" || e.key === " ") { e.preventDefault(); toggleProblem(p); }
          });
          row.addEventListener("dblclick", function (e) {
            if (e.target.closest(".notes-btn") || e.target.closest(".notes-panel") || e.target.closest(".practice-btn") || e.target.closest(".link-btn")) return;
            e.preventDefault(); openNotesPanel();
          });

          var practiceBtn = row.querySelector(".practice-btn");
          practiceBtn.addEventListener("click", function (e) { e.stopPropagation(); openPracticeConfirm(p); });

          var btn = row.querySelector(".notes-btn");
          var panel = row.querySelector(".notes-panel");
          var ta = row.querySelector("markdown-editor");
          var savedEl = row.querySelector(".notes-saved");
          var codeMount = row.querySelector(".code-pane-mount");
          var tabs = row.querySelectorAll(".notes-tab[data-tab]");
          var panes = row.querySelectorAll(".notes-pane");
          var tabAddBtn = row.querySelector(".tab-add-approach-btn");
          var editBtn = row.querySelector(".tab-edit-md-btn");
          var extToolbar = row.querySelector(".formatting-toolbar-ext");

          if (extToolbar) {
            extToolbar.addEventListener("mousedown", function(e) { e.preventDefault(); });
            extToolbar.addEventListener("click", function(e) {
              var actionBtn = e.target.closest("button");
              if (!actionBtn) return;
              var action = actionBtn.getAttribute("data-action");
              if (ta && ta.formatAction) ta.formatAction(action);
            });
          }

          function refreshNoteBadge() {
            var filled = (state.notes[p.id] || "").trim().length > 0 || codePane.hasContent();
            btn.classList.toggle("has-note", filled);
            btn.title = filled ? "Edit note" : "Add note";
          }
          function flashSaved() {
            if (editBtn) {
              editBtn.classList.remove("flash-sweep");
              // Trigger reflow to restart animation
              void editBtn.offsetWidth;
              editBtn.classList.add("flash-sweep");
            }
          }

          function openNotesPanel() {
            // Close any other open panels first (accordion behavior)
            document.querySelectorAll('.notes-panel.is-open').forEach(function (p) {
              if (p !== panel) {
                p.classList.remove('is-open');
                var prevBtn = document.querySelector('.notes-btn[aria-controls="' + p.id + '"]');
                if (prevBtn) prevBtn.setAttribute('aria-expanded', 'false');
              }
            });

            if (!panel.classList.contains("is-open")) { panel.classList.add("is-open"); btn.setAttribute("aria-expanded", "true"); }
            setTimeout(function () { ta.focusEditor(); }, 400); // wait for transition
          }
          function closeNotesPanel() {
            if (panel.classList.contains("is-open")) { panel.classList.remove("is-open"); btn.setAttribute("aria-expanded", "false"); }
          }

          var codePane = setupCodePane(p.id, codeMount, function () { refreshNoteBadge(); flashSaved(); }, tabAddBtn);

          btn.addEventListener("click", function (e) {
            e.stopPropagation();
            if (panel.classList.contains("is-open")) closeNotesPanel();
            else openNotesPanel();
          });

          tabs.forEach(function (tab) {
            tab.addEventListener("click", function (e) {
              e.stopPropagation();
              var target = tab.getAttribute("data-tab");
              tabs.forEach(function (t) { t.classList.toggle("active", t === tab); });
              panes.forEach(function (pn) { pn.classList.toggle("active", pn.getAttribute("data-pane") === target); });
              if (tabAddBtn) tabAddBtn.classList.toggle("visible", target === "code");
              if (editBtn) editBtn.style.display = target === "text" ? "flex" : "none";
              if (target !== "code") { setTimeout(function () { ta.focusEditor(); }, 50); }
            });
          });

          var saveTimer;
          if (editBtn) {
            editBtn.addEventListener("click", function (e) {
              e.stopPropagation();
              ta.setEditMode(!ta.isEditing);
            });
            ta.addEventListener('mode-change', function (e) {
              if (e.detail.isEditing) {
                editBtn.title = "Done Editing";
                editBtn.innerHTML = '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0; display:block;"><path class="anim-circle" d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline class="anim-tick" points="9 11.01 12 14.01 22 4"/></svg>';
                if (extToolbar) {
                  extToolbar.style.opacity = "1";
                  extToolbar.style.pointerEvents = "auto";
                }
              } else {
                editBtn.title = "Edit Notes";
                editBtn.innerHTML = '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0; display:block;"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>';
                if (extToolbar) {
                  extToolbar.style.opacity = "0";
                  extToolbar.style.pointerEvents = "none";
                }
              }
            });
          }
          ta.addEventListener("note-change", function (e) {
            clearTimeout(saveTimer);
            saveTimer = setTimeout(function () { saveNoteFor(p.id, e.detail.value); refreshNoteBadge(); flashSaved(); }, 500);
          });

          // Panels only close via their toggle button — allowing multiple panels open at once.

          document.addEventListener("mousedown", function (e) {
            if (!panel.classList.contains("is-open")) return;
            // Click inside the panel or on its toggle button → do nothing
            if (panel.contains(e.target) || e.target === btn || btn.contains(e.target)) return;
            // If click is on ANY other notes toggle button → don't close here,
            // let the click handler of that button handle it smoothly to prevent layout shifts.
            if (e.target.closest(".notes-btn")) return;
            // In markdown EDIT mode → just save (switch to view), keep panel open
            if (ta && ta.isEditing) return;
            // If code editor textarea is focused → keep panel open (same as edit mode)
            if (codeMount && codeMount.querySelector(".code-editor-wrap.is-focused")) return;
            // In VIEW mode (and code not focused) → close the panel
            closeNotesPanel();
          });

          refreshNoteBadge();
          listEl.appendChild(row);
        });
      }

      /* ── Toggle + modals ─────────────────────────────────── */
      function toggleProblem(p) {
        if (state.completed.has(p.id)) openConfirm(p);
        else { state.completed.add(p.id); saveCompleted(); renderList(); renderProgress(); }
      }
      function openConfirm(p) {
        state.pending = p;
        document.getElementById("modalBody").textContent = '"' + p.title + '" will be removed from your completed list. Are you sure?';
        document.getElementById("modalOverlay").hidden = false;
        document.getElementById("modalCancel").focus();
      }
      function closeConfirm() { state.pending = null; document.getElementById("modalOverlay").hidden = true; }
      function confirmRemove() {
        var p = state.pending;
        if (!p) { closeConfirm(); return; }
        state.completed.delete(p.id); closeConfirm(); saveCompleted(); renderList(); renderProgress();
      }
      function openPracticeConfirm(p) {
        state.practicePending = p;
        var current = state.practiceCounts[p.id] || 0;
        document.getElementById("practiceModalBody").textContent = 'Have you practised "' + p.title + '"? This will be logged as practice #' + (current + 1) + '. You cannot undo this.';
        document.getElementById("practiceModalOverlay").hidden = false;
        document.getElementById("practiceModalCancel").focus();
      }
      function closePracticeConfirm() { state.practicePending = null; document.getElementById("practiceModalOverlay").hidden = true; }
      function confirmPractice() {
        var p = state.practicePending;
        if (!p) { closePracticeConfirm(); return; }
        state.practiceCounts[p.id] = (state.practiceCounts[p.id] || 0) + 1;
        closePracticeConfirm(); savePracticeCounts(); renderList();
        showToast("Practice #" + state.practiceCounts[p.id] + " logged for \"" + p.title + "\"! 🎯");
      }

      /* ── Events ──────────────────────────────────────────── */
      document.getElementById("searchInput").addEventListener("input", function (e) { state.search = e.target.value; renderList(); });
      document.getElementById("dayPrev").addEventListener("click", function () { if (dayIndex > 0) { dayIndex--; state.day = DAYS[dayIndex]; updateDayControls(); renderList(); } });
      document.getElementById("dayNext").addEventListener("click", function () { if (dayIndex < DAYS.length - 1) { dayIndex++; state.day = DAYS[dayIndex]; updateDayControls(); renderList(); } });
      document.getElementById("modalCancel").addEventListener("click", closeConfirm);
      document.getElementById("modalConfirm").addEventListener("click", confirmRemove);
      document.getElementById("modalOverlay").addEventListener("click", function (e) { if (e.target.id === "modalOverlay") closeConfirm(); });
      document.getElementById("practiceModalCancel").addEventListener("click", closePracticeConfirm);
      document.getElementById("practiceModalConfirm").addEventListener("click", confirmPractice);
      document.getElementById("practiceModalOverlay").addEventListener("click", function (e) { if (e.target.id === "practiceModalOverlay") closePracticeConfirm(); });
      document.getElementById("approachModalCancel").addEventListener("click", closeApproachDeleteConfirm);
      document.getElementById("approachModalConfirm").addEventListener("click", confirmApproachDelete);
      document.getElementById("approachModalOverlay").addEventListener("click", function (e) { if (e.target.id === "approachModalOverlay") closeApproachDeleteConfirm(); });
      document.addEventListener("keydown", function (e) {
        if (e.key === "Escape") {
          if (!document.getElementById("modalOverlay").hidden) closeConfirm();
          if (!document.getElementById("practiceModalOverlay").hidden) closePracticeConfirm();
          if (!document.getElementById("approachModalOverlay").hidden) closeApproachDeleteConfirm();
        }
      });

      /* ── Init ────────────────────────────────────────────── */
      if (!topicId) {
        showFatalError("No topic was specified in the URL.");
      } else {
        loadTopicData(topicId).then(function (data) {
          buildProblems(data);
          document.title = (data.title || "DSA Practice") + " · DSA Practice";
          document.getElementById("pageTitleText").textContent = data.title || "Practice";
          updateDayControls(); renderList(); renderProgress();
          return loadAll();
        }).then(function () {
          setDbStatus(true); renderProgress(); renderList();
        }).catch(function (err) {
          console.error(err);
          if (!allProblems.length) showFatalError(err.message || "Something went wrong loading this topic.");
          else { setDbStatus(false); showToast("Sync unavailable — progress may not be up to date."); renderProgress(); renderList(); }
        });
      }
    })();
  </script>
</body>
